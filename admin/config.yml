backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "products"
    label: "Бараанууд"
    folder: "content/products"
    create: true
    fields:
      - { label: "Барааны нэр", name: "title", widget: "string" }
      - { label: "Үнэ", name: "price", widget: "number" }
      - { label: "Зураг", name: "image", widget: "image" }
      - { label: "Дэлгэрэнгүй тайлбар", name: "body", widget: "markdown" }
