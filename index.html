<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>УРАН ХИЙЦ | Luxury Store</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          emailjs.init("nfT3fjYlvh2OVOO5W"); 
       })();
    </script>

    <style>
        :root { --gold: #d4af37; --bg: #000; --card: #111; --red: #ff4d4d; --green: #25D366; }
        body { background-color: var(--bg); color: #fff; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding-bottom: 120px; }
        
        .nav-header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 20px; background: #111; border-bottom: 1px solid #222; 
            position: sticky; top: 0; z-index: 100; 
        }
        .nav-logo { height: 35px; }
        .nav-right { display: flex; gap: 15px; align-items: center; }
        
        .cart-icon-btn { position: relative; background: none; border: none; cursor: pointer; padding: 5px; }
        .cart-count { 
            position: absolute; top: -5px; right: -5px; background: var(--red); 
            color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; font-weight: bold;
        }

        /* Бүтээгдэхүүний жагсаалт (10 ширхэг зураг) */
        .product-list-scroll { 
            display: flex; gap: 12px; overflow-x: auto; padding: 15px; 
            background: #050505; border-bottom: 1px solid #222; scrollbar-width: none;
        }
        .product-thumb { 
            width: 80px; height: 80px; border-radius: 10px; flex-shrink: 0; 
            cursor: pointer; border: 2px solid transparent; transition: 0.3s; object-fit: cover;
        }
        .product-thumb.active { border-color: var(--gold); transform: scale(1.05); }

        .main-img-holder { width: 100%; aspect-ratio: 1/1; overflow: hidden; background: #000; }
        .main-img-holder img { width: 100%; height: 100%; object-fit: cover; }
        
        .info-section { padding: 20px; }
        .product-title { font-size: 22px; font-weight: bold; margin-bottom: 5px; color: var(--gold); }
        .product-desc { font-size: 14px; color: #aaa; margin-bottom: 15px; }
        .price-box { margin-bottom: 15px; }
        .current-price { font-size: 24px; font-weight: 800; color: #fff; }

        .selection-box { background: #1a1a1a; padding: 20px; border-radius: 12px; margin: 15px 0; border: 1px solid #333; }
        .size-options { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0 20px 0; }
        .size-btn { background: #000; border: 1px solid #444; color: #fff; padding: 10px 15px; border-radius: 8px; cursor: pointer; min-width: 45px; }
        .size-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(212, 175, 55, 0.1); }

        .qty-label { font-size: 12px; color: #777; display: block; margin-bottom: 10px; }
        .qty-control-main { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; background: #000; padding: 10px 15px; border-radius: 10px; width: fit-content; border: 1px solid #222; }
        .qty-btn-main { background: #333; border: none; color: #fff; width: 35px; height: 35px; border-radius: 8px; cursor: pointer; font-size: 20px; font-weight: bold; }
        #main-qty-val { font-size: 18px; font-weight: bold; min-width: 20px; text-align: center; }

        .add-to-cart-btn { 
            width: 100%; background: #fff; color: #000; border: none; padding: 16px; 
            border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 15px;
        }

        .cart-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 1000; display: none; flex-direction: column;
        }
        .cart-content { padding: 20px; flex: 1; overflow-y: auto; }
        .cart-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px; background: #111; border-radius: 10px; margin-bottom: 10px; border: 1px solid #222;
        }
        .remove-btn { color: var(--red); background: none; border: none; font-size: 14px; cursor: pointer; border: 1px solid var(--red); padding: 5px 10px; border-radius: 6px;}

        .order-form { padding: 20px; background: #111; border-top: 1px solid #222; }
        .order-form input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; background: #222; border: 1px solid #333; color: #fff; box-sizing: border-box; }
    </style>
</head>
<body>

<nav class="nav-header">
    <img src="https://i.postimg.cc/PrZQPYHB/Luxury-Footwear-Logo.png" class="nav-logo">
    <div class="nav-right">
        <a href="videos.html" style="color:var(--gold); text-decoration:none; font-size:12px; font-weight: bold; border: 1px solid var(--gold); padding: 5px 10px; border-radius: 5px;">БИЧЛЭГ</a>
        <button class="cart-icon-btn" onclick="toggleCart()">
            <span style="font-size: 22px;">🛒</span>
            <span id="cart-count-val" class="cart-count">0</span>
        </button>
    </div>
</nav>

<div class="product-list-scroll" id="product-list">
    </div>

<div class="product-container">
    <div class="main-img-holder">
        <img id="main-view" src="">
    </div>

    <div class="info-section">
        <h1 id="display-title" class="product-title">Сонгоогүй</h1>
        <p id="display-desc" class="product-desc">Гутал сонгоно уу.</p>
        <div class="price-box">
            <span id="display-price" class="current-price">0₮</span>
        </div>

        <div class="selection-box">
            <span class="qty-label">ХЭМЖЭЭ СОНГОХ:</span>
            <div class="size-options">
                <button class="size-btn" onclick="selectSize(this)">38</button>
                <button class="size-btn" onclick="selectSize(this)">39</button>
                <button class="size-btn" onclick="selectSize(this)">40</button>
                <button class="size-btn" onclick="selectSize(this)">41</button>
                <button class="size-btn" onclick="selectSize(this)">42</button>
            </div>

            <span class="qty-label">ШИРХЭГ (QUANTITY):</span>
            <div class="qty-control-main">
                <button class="qty-btn-main" onclick="updateMainQty(-1)">−</button>
                <span id="main-qty-val">0</span>
                <button class="qty-btn-main" onclick="updateMainQty(1)">+</button>
            </div>

            <button class="add-to-cart-btn" onclick="addToCart()">САГСАНД НЭМЭХ</button>
        </div>
    </div>
</div>

<div id="cartOverlay" class="cart-overlay">
    <div style="padding: 20px; display: flex; justify-content: space-between; border-bottom: 1px solid #222; align-items: center;">
        <h3 style="margin:0;">Миний сагс</h3>
        <button onclick="toggleCart()" style="background:none; border:none; color:#fff; font-size:28px;">✕</button>
    </div>
    <div id="cartItems" class="cart-content"></div>
    <div class="order-form">
        <input type="text" id="p-name" placeholder="Таны нэр">
        <input type="tel" id="p-phone" placeholder="Утасны дугаар">
        <div style="display:flex; justify-content:space-between; margin:15px 0; font-size: 18px;">
            <span>Нийт дүн:</span>
            <span id="cart-total" style="color:var(--gold); font-weight:bold;">0₮</span>
        </div>
        <button class="add-to-cart-btn" style="background:var(--gold);" onclick="sendOrder()">ЗАХИАЛГА ИЛГЭЭХ</button>
    </div>
</div>

<script>
// 10 БҮТЭЭГДЭХҮҮНИЙ ӨГӨГДӨЛ
const products = [
    { id: 1, name: "Uran Classic Black", desc: "Цэвэр арьсан, сонгодог загвар", price: 250000, img: "https://picsum.photos/600/600?random=1" },
    { id: 2, name: "Uran Brown Oxford", desc: "Албан ёсны уулзалтанд тохиромжтой", price: 280000, img: "https://picsum.photos/600/600?random=2" },
    { id: 3, name: "Uran Loafer Gold", desc: "Тансаг зэрэглэлийн гоёлын лоафер", price: 320000, img: "https://picsum.photos/600/600?random=3" },
    { id: 4, name: "Uran Daily Soft", desc: "Өдөр тутам өмсөхөд маш эвтэйхэн", price: 210000, img: "https://picsum.photos/600/600?random=4" },
    { id: 5, name: "Uran Chelsea Boot", desc: "Намар, хаврын загварлаг сонголт", price: 350000, img: "https://picsum.photos/600/600?random=5" },
    { id: 6, name: "Uran Sport Leather", desc: "Чөлөөт загварын арьсан пүүз", price: 240000, img: "https://picsum.photos/600/600?random=6" },
    { id: 7, name: "Uran Winter Pro", desc: "Үслэг дотортой, өвлийн гутал", price: 380000, img: "https://picsum.photos/600/600?random=7" },
    { id: 8, name: "Uran Monk Strap", desc: "Өвөрмөц бүчтэй, чамин загвар", price: 290000, img: "https://picsum.photos/600/600?random=8" },
    { id: 9, name: "Uran Suede Blue", desc: "Милл арьсан, цэнхэр өнгө", price: 260000, img: "https://picsum.photos/600/600?random=9" },
    { id: 10, name: "Uran Elite Special", desc: "Гар аргаар хийсэн тусгай загвар", price: 450000, img: "https://picsum.photos/600/600?random=10" }
];

let cart = [];
let selectedSize = "";
let currentQty = 0;
let currentProduct = products[0];

// Жагсаалтыг дэлгэцэнд гаргах
const listContainer = document.getElementById('product-list');
products.forEach((p, index) => {
    const img = document.createElement('img');
    img.src = p.img;
    img.className = 'product-thumb' + (index === 0 ? ' active' : '');
    img.onclick = () => selectProduct(p, img);
    listContainer.appendChild(img);
});

// Бүтээгдэхүүн сонгох функц
function selectProduct(p, el) {
    currentProduct = p;
    document.getElementById('main-view').src = p.img;
    document.getElementById('display-title').innerText = p.name;
    document.getElementById('display-desc').innerText = p.desc;
    document.getElementById('display-price').innerText = p.price.toLocaleString() + "₮";
    
    document.querySelectorAll('.product-thumb').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    
    // Сонгох бүрт тоог 0 болгоно
    currentQty = 0;
    document.getElementById('main-qty-val').innerText = "0";
}

// Анхны бүтээгдэхүүнийг идэвхжүүлэх
selectProduct(products[0], listContainer.firstChild);

function selectSize(btn) {
    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedSize = btn.innerText;
}

function updateMainQty(val) {
    currentQty = Math.max(0, currentQty + val);
    document.getElementById('main-qty-val').innerText = currentQty;
}

function addToCart() {
    if(!selectedSize) { alert("Хэмжээгээ сонгоно уу"); return; }
    if(currentQty === 0) { alert("Ширхэгээ сонгоно уу"); return; }
    
    const cartId = `${currentProduct.id}-${selectedSize}`;
    const existingIdx = cart.findIndex(i => i.cartId === cartId);
    
    if(existingIdx > -1) {
        cart[existingIdx].qty += currentQty;
    } else {
        cart.push({ 
            cartId: cartId,
            name: currentProduct.name, 
            size: selectedSize, 
            price: currentProduct.price, 
            qty: currentQty 
        });
    }
    
    currentQty = 0;
    document.getElementById('main-qty-val').innerText = "0";
    updateCartUI();
    alert("Сагсанд нэмэгдлээ!");
}

function updateCartUI() {
    const totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
    document.getElementById('cart-count-val').innerText = totalItems;
    
    const container = document.getElementById('cartItems');
    container.innerHTML = "";
    
    let totalPrice = 0;
    cart.forEach(item => {
        const itemTotal = item.price * item.qty;
        totalPrice += itemTotal;
        container.innerHTML += `
            <div class="cart-item">
                <div>
                    <div style="font-weight:bold;">${item.name}</div>
                    <div style="font-size:12px; color:var(--gold);">Size: ${item.size} | ${item.qty}ш</div>
                </div>
                <div style="text-align:right;">
                    <div style="font-weight:bold;">${itemTotal.toLocaleString()}₮</div>
                    <button class="remove-btn" onclick="removeItem('${item.cartId}')">Устгах</button>
                </div>
            </div>
        `;
    });
    document.getElementById('cart-total').innerText = totalPrice.toLocaleString() + "₮";
}

function removeItem(id) {
    cart = cart.filter(i => i.cartId !== id);
    updateCartUI();
}

function toggleCart() {
    const el = document.getElementById('cartOverlay');
    el.style.display = el.style.display === 'flex' ? 'none' : 'flex';
}

function sendOrder() {
    const name = document.getElementById('p-name').value;
    const phone = document.getElementById('p-phone').value;
    if(cart.length === 0 || !name || !phone) { alert("Мэдээллээ бүрэн бөглөнө үү"); return; }

    const details = cart.map(i => `${i.name} (${i.size}р - ${i.qty}ш)`).join(", ");
    const params = {
        from_name: name,
        phone: phone,
        order_details: details,
        total_price: document.getElementById('cart-total').innerText
    };

    emailjs.send('service_izdours', 'template_ix01rik', params)
    .then(() => {
        alert("Захиалга амжилттай илгээгдлээ!");
        cart = []; updateCartUI(); toggleCart();
    });
}
</script>
</body>
</html>
