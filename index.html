<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>УРАН ХИЙЦ | Handmade Luxury Footwear</title>
    
    <link rel="stylesheet" href="style.css">
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          emailjs.init("nfT3fjYlvh2OVOO5W"); // Таны Public Key
       })();
    </script>
</head>
<body>

<nav class="nav-header">
    <img src="https://i.postimg.cc/PrZQPYHB/Luxury-Footwear-Logo.png" class="nav-logo">
</nav>

<section id="products">
    <h2 class="section-title">Бүтээгдэхүүн</h2>
    <div id="product-list"></div>
</section>

<section class="order-container">
    <h2 class="section-title">Захиалга өгөх</h2>
    <div class="order-form">
        <input type="text" id="p-name" placeholder="Таны нэр" oninput="calc()">
        <input type="tel" id="p-phone" placeholder="Утасны дугаар" oninput="calc()">
        <input type="email" id="p-email" placeholder="Имэйл хаяг" oninput="calc()">
        <label class="checkbox-label">
            <input type="checkbox" id="del-check" onchange="calc()"> Хүргэлт авах (+15,000₮)
        </label>
        <input type="text" id="address" placeholder="Хүргэлтийн хаяг" style="display:none;" oninput="calc()">
    </div>
</section>

<div class="footer-bar">
    <div class="total-info">
        <span class="label">НИЙТ ТӨЛӨХ</span>
        <span id="res-total" class="amount">0</span>₮
    </div>
    <button id="submit-btn" class="checkout-btn" disabled onclick="sendOrder()">ЗАХИАЛАХ</button>
</div>

<script src="script.js"></script>
</body>
</html>
