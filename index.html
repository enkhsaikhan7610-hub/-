<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Уран Хийц | Захиалга</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <nav><div class="logo">URAN HIITS</div></nav>
</header>

<section class="container">
    <div class="order-card">
        <h2>Гар хийцийн гутал захиалга</h2>
        <p class="price-tag">Нэгж үнэ: 250,000 ₮</p>

        <div class="size-selection">
            <p>Хэмжээ тус бүрийн тоог оруулна уу:</p>
            <div class="size-grid">
                <div class="size-row"><span>38:</span> <input type="number" class="size-input" data-size="38" value="0" min="0"></div>
                <div class="size-row"><span>39:</span> <input type="number" class="size-input" data-size="39" value="0" min="0"></div>
                <div class="size-row"><span>40:</span> <input type="number" class="size-input" data-size="40" value="0" min="0"></div>
                <div class="size-row"><span>41:</span> <input type="number" class="size-input" data-size="41" value="0" min="0"></div>
                <div class="size-row"><span>42:</span> <input type="number" class="size-input" data-size="42" value="0" min="0"></div>
                <div class="size-row"><span>43:</span> <input type="number" class="size-input" data-size="43" value="0" min="0"></div>
            </div>
        </div>

        <div class="delivery-option">
            <label style="display: flex; align-items: center; cursor: pointer;">
                <input type="checkbox" id="delivery-check" style="margin-right: 10px;"> Хүргэлт авах (+15,000 ₮)
            </label>
            <div id="address-field" style="display: none;">
                <input type="text" id="delivery_address" name="address" placeholder="Хүргэлтийн хаяг оруулна уу...">
            </div>
        </div>

        <div class="total-section">
            <p>Нийт гутал: <strong id="total-qty">0</strong> ширхэг</p>
            <p>Хүргэлт: <strong id="delivery-price">0</strong> ₮</p>
            <p>Нийт дүн: <strong id="total-amount">0</strong> ₮</p>
        </div>

        <form name="shoe-orders" method="POST" data-netlify="true" action="/">
            <input type="hidden" name="order_details" id="hidden-details">
            <input type="hidden" name="final_price" id="hidden-total">
            
            <input type="text" name="customer_name" placeholder="Таны нэр" required>
            <input type="tel" name="customer_phone" placeholder="Утасны дугаар" required>
            
            <div class="payment-info">
                <p>Хаан банк: <strong>5000XXXXXX</strong> (Б. Энхсайхан)</p>
                <p>Гүйлгээний утга: Утасны дугаараа бичнэ үү.</p>
            </div>
            <button type="submit" class="btn-submit" id="submit-btn" disabled>Гутал сонгоно уу</button>
        </form>
    </div>
</section>

<script src="script.js"></script>
</body>
</html>
